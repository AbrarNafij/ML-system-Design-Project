stages:
  ml_data_integration:
    cmd: python src/ml_01_data_integration.py
    deps:
      - data/raw/GSE5281_series_matrix.txt
      - src/ml_common.py
      - src/ml_01_data_integration.py
    outs:
      - data/interim/expression_matrix.csv
      - data/interim/sample_metadata.csv

  ml_data_cleaning_processing:
    cmd: python src/ml_02_data_cleaning_processing.py
    deps:
      - data/interim/expression_matrix.csv
      - data/interim/sample_metadata.csv
      - src/ml_common.py
      - src/ml_02_data_cleaning_processing.py
    outs:
      - data/processed/expression_log2.csv
      - data/processed/differential_expression_results.csv
      - data/processed/selected_genes.csv
      - data/processed/ml_features.csv
      - data/processed/ml_labels.csv
      - models/preprocessor.joblib

  ml_model_training:
    cmd: python src/ml_03_model_training.py --epochs 150
    deps:
      - data/processed/ml_features.csv
      - data/processed/ml_labels.csv
      - src/ml_common.py
      - src/ml_03_model_training.py
    outs:
      - models/contrastive_encoder.joblib
      - models/random_forest_classifier.joblib
      - models/training_split.joblib

  ml_model_evaluation:
    cmd: python src/ml_04_model_evaluation.py
    deps:
      - data/processed/ml_features.csv
      - data/processed/ml_labels.csv
      - models/contrastive_encoder.joblib
      - models/random_forest_classifier.joblib
      - models/training_split.joblib
      - src/ml_common.py
      - src/ml_03_model_training.py
      - src/ml_04_model_evaluation.py
    metrics:
      - data/processed/model_metrics.json:
          cache: false
    outs:
      - data/processed/classification_report.csv
      - data/processed/confusion_matrix.csv
